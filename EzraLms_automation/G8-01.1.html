    &lt;div class=&quot;section active&quot; id=&quot;sec0&quot;&gt;
        &lt;div class=&quot;section-title&quot;&gt;&lt;span class=&quot;dot&quot;&gt;&lt;/span&gt; &lt;span id=&quot;t0-title&quot;&gt;Understanding Integers&lt;/span&gt;&lt;/div&gt;
        
        &lt;div class=&quot;card&quot;&gt;
            &lt;h2 id=&quot;t0-def&quot;&gt;What are Integers?&lt;/h2&gt;
            &lt;p id=&quot;t0-p1&quot;&gt;Integers are whole numbers that can be positive, negative, or zero.&lt;/p&gt;
        &lt;/div&gt;

        &lt;div class=&quot;card&quot;&gt;
            &lt;h2&gt;Number Line&lt;/h2&gt;
            &lt;div style=&quot;display:flex;justify-content:center;align-items:center;gap:8px;font-size:18px;padding:20px 0;flex-wrap:wrap&quot;&gt;
                &lt;span style=&quot;color:#c00&quot;&gt;-3&lt;/span&gt;&lt;span style=&quot;color:#c00&quot;&gt;-2&lt;/span&gt;&lt;span style=&quot;color:#c00&quot;&gt;-1&lt;/span&gt;
                &lt;strong&gt;0&lt;/strong&gt;
                &lt;span style=&quot;color:#185FA5&quot;&gt;1&lt;/span&gt;&lt;span style=&quot;color:#185FA5&quot;&gt;2&lt;/span&gt;&lt;span style=&quot;color:#185FA5&quot;&gt;3&lt;/span&gt;
            &lt;/div&gt;
            &lt;p style=&quot;text-align:center;font-size:14px;color:var(--color-text-secondary)&quot;&gt;← Negative integers | Zero | Positive integers →&lt;/p&gt;
        &lt;/div&gt;

        &lt;div class=&quot;card&quot;&gt;
            &lt;h2&gt;Powers and Indices&lt;/h2&gt;
            &lt;p&gt;A power shows repeated multiplication. The small raised number is called the &lt;strong&gt;index&lt;/strong&gt; (plural: indices).&lt;/p&gt;
            &lt;div class=&quot;example-box&quot;&gt;
                &lt;h4&gt;Example:&lt;/h4&gt;
                &lt;div class=&quot;math-display&quot;&gt;2³ = 2 × 2 × 2 = 8&lt;/div&gt;
                &lt;p style=&quot;font-size:13px;color:#0C447C&quot;&gt;2 is the &lt;strong&gt;base&lt;/strong&gt;, 3 is the &lt;strong&gt;index/power&lt;/strong&gt;&lt;/p&gt;
            &lt;/div&gt;
        &lt;/div&gt;

        &lt;div class=&quot;tip-box&quot;&gt;
            &lt;strong&gt;Remember:&lt;/strong&gt; Any number raised to the power of 0 equals 1 (except 0⁰ which is undefined).
        &lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;section&quot; id=&quot;sec1&quot;&gt;
        &lt;div class=&quot;section-title&quot;&gt;&lt;span class=&quot;dot&quot;&gt;&lt;/span&gt; &lt;span id=&quot;t1-title&quot;&gt;Laws of Exponents&lt;/span&gt;&lt;/div&gt;
        
        &lt;div class=&quot;card&quot;&gt;
            &lt;h2&gt;Law 1: Multiplying Powers&lt;/h2&gt;
            &lt;div class=&quot;law-box&quot;&gt;
                &lt;h4&gt;aᵐ × aⁿ = aᵐ⁺ⁿ&lt;/h4&gt;
            &lt;/div&gt;
            &lt;div class=&quot;example-box&quot;&gt;
                &lt;h4&gt;Example:&lt;/h4&gt;
                &lt;div class=&quot;math-display&quot;&gt;2³ × 2⁴ = 2³⁺⁴ = 2⁷ = 128&lt;/div&gt;
            &lt;/div&gt;
        &lt;/div&gt;

        &lt;div class=&quot;card&quot;&gt;
            &lt;h2&gt;Law 2: Dividing Powers&lt;/h2&gt;
            &lt;div class=&quot;law-box&quot;&gt;
                &lt;h4&gt;aᵐ ÷ aⁿ = aᵐ⁻ⁿ&lt;/h4&gt;
            &lt;/div&gt;
            &lt;div class=&quot;example-box&quot;&gt;
                &lt;h4&gt;Example:&lt;/h4&gt;
                &lt;div class=&quot;math-display&quot;&gt;2⁵ ÷ 2² = 2⁵⁻² = 2³ = 8&lt;/div&gt;
            &lt;/div&gt;
        &lt;/div&gt;

        &lt;div class=&quot;card&quot;&gt;
            &lt;h2&gt;Law 3: Power of a Power&lt;/h2&gt;
            &lt;div class=&quot;law-box&quot;&gt;
                &lt;h4&gt;(aᵐ)ⁿ = aᵐⁿ&lt;/h4&gt;
            &lt;/div&gt;
            &lt;div class=&quot;example-box&quot;&gt;
                &lt;h4&gt;Example:&lt;/h4&gt;
                &lt;div class=&quot;math-display&quot;&gt;(2²)³ = 2²ˣ³ = 2⁶ = 64&lt;/div&gt;
            &lt;/div&gt;
        &lt;/div&gt;

        &lt;div class=&quot;card&quot;&gt;
            &lt;h2&gt;Law 4: Power of a Product&lt;/h2&gt;
            &lt;div class=&quot;law-box&quot;&gt;
                &lt;h4&gt;(ab)ᵐ = aᵐ × bᵐ&lt;/h4&gt;
            &lt;/div&gt;
            &lt;div class=&quot;example-box&quot;&gt;
                &lt;h4&gt;Example:&lt;/h4&gt;
                &lt;div class=&quot;math-display&quot;&gt;(2 × 3)² = 2² × 3² = 4 × 9 = 36&lt;/div&gt;
            &lt;/div&gt;
        &lt;/div&gt;

        &lt;div class=&quot;tip-box&quot;&gt;
            &lt;strong&gt;Tip:&lt;/strong&gt; When the base is the same, ADD indices when multiplying, SUBTRACT when dividing!
        &lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;section&quot; id=&quot;sec2&quot;&gt;
        &lt;div class=&quot;section-title&quot;&gt;&lt;span class=&quot;dot&quot;&gt;&lt;/span&gt; &lt;span id=&quot;t2-title&quot;&gt;Square and Cube Roots&lt;/span&gt;&lt;/div&gt;
        
        &lt;div class=&quot;card&quot;&gt;
            &lt;h2&gt;Square Root (√)&lt;/h2&gt;
            &lt;p&gt;The square root of a number is a value that, when multiplied by itself, gives the original number.&lt;/p&gt;
            &lt;div class=&quot;example-box&quot;&gt;
                &lt;h4&gt;Example:&lt;/h4&gt;
                &lt;div class=&quot;math-display&quot;&gt;√16 = 4 because 4 × 4 = 16&lt;/div&gt;
            &lt;/div&gt;
        &lt;/div&gt;

        &lt;div class=&quot;card&quot;&gt;
            &lt;h2&gt;Cube Root (∛)&lt;/h2&gt;
            &lt;p&gt;The cube root of a number is a value that, when multiplied by itself three times, gives the original number.&lt;/p&gt;
            &lt;div class=&quot;example-box&quot;&gt;
                &lt;h4&gt;Example:&lt;/h4&gt;
                &lt;div class=&quot;math-display&quot;&gt;∛27 = 3 because 3 × 3 × 3 = 27&lt;/div&gt;
            &lt;/div&gt;
        &lt;/div&gt;

        &lt;div class=&quot;card&quot;&gt;
            &lt;h2&gt;Comparing Roots&lt;/h2&gt;
            &lt;div class=&quot;concept-grid&quot;&gt;
                &lt;div class=&quot;concept-item&quot;&gt;
                    &lt;h3&gt;Perfect Squares&lt;/h3&gt;
                    &lt;p&gt;1² = 1, 2² = 4, 3² = 9&lt;br&gt;4² = 16, 5² = 25, 6² = 36&lt;br&gt;7² = 49, 8² = 64, 9² = 81, 10² = 100&lt;/p&gt;
                &lt;/div&gt;
                &lt;div class=&quot;concept-item&quot;&gt;
                    &lt;h3&gt;Perfect Cubes&lt;/h3&gt;
                    &lt;p&gt;1³ = 1, 2³ = 8, 3³ = 27&lt;br&gt;4³ = 64, 5³ = 125&lt;br&gt;6³ = 216, 7³ = 343&lt;/p&gt;
                &lt;/div&gt;
            &lt;/div&gt;
        &lt;/div&gt;

        &lt;div class=&quot;tip-box&quot;&gt;
            &lt;strong&gt;Remember:&lt;/strong&gt; √(a × b) = √a × √b, but √(a + b) ≠ √a + √b
        &lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;section&quot; id=&quot;sec3&quot;&gt;

&lt;script&gt;
    let lang = 'en';
    let score = 0, total = 0;
    const answered = {};

    const TX = {
        en: {
            htitle:'G8-01.1 Integers, Powers and Roots', hsub:'Cambridge Grade 8 Mathematics — Number and Algebra',
            tab0:'Concepts', tab1:'Laws of Exponents', tab2:'Square &amp; Cube Roots', tab3:'Practice',

            score:'Score', q1:'Q1. Simplify: 2⁴ × 2³', q2:'Q2. Simplify: (3²)³', q3:'Q3. What is √144?', q4:'Q4. Simplify: 5⁶ ÷ 5²', q5:'Q5. What is ∛125?',
            q1cr:'Correct! 2⁴ × 2³ = 2⁴⁺³ = 2⁷', q1wr:'Wrong! Use law: aᵐ × aⁿ = aᵐ⁺ⁿ',

        },
        id: {

            tab0:'Konsep', tab1:'Hukum Eksponen', tab2:'Akar Kuadrat &amp; Kubik', tab3:'Latihan',
            t0title:'Memahami Bilangan Bulat', t0def:'Apa itu Bilangan Bulat?', t0p1:'Bilangan bulat adalah bilangan keseluruhan yang bisa positif, negatif, atau nol.',
            score:'Skor', q1:'S1. Sederhanakan: 2⁴ × 2³', q2:'S2. Sederhanakan: (3²)³', q3:'S3. Berapa √144?', q4:'S4. Sederhanakan: 5⁶ ÷ 5²', q5:'S5. Berapa ∛125?',
            q1cr:'Benar! 2⁴ × 2³ = 2⁴⁺³ = 2⁷', q1wr:'Salah! Gunakan hukum: aᵐ × aⁿ = aᵐ⁺ⁿ',
            q2cr:'Benar! (3²)³ = 3²ˣ³ = 3⁶', q2wr:'Salah! Gunakan hukum: (aᵐ)ⁿ = aᵐⁿ',

            q4cr:'Benar! 5⁶ ÷ 5² = 5⁶⁻² = 5⁴', q4wr:'Salah! Gunakan hukum: aᵐ ÷ aⁿ = aᵐ⁻ⁿ',
            q5cr:'Benar! ∛125 = 5', q5wr:'Salah! 5 × 5 × 5 = 125'
        }
    };

    function t(k) { return TX[lang][k] || ''; }

    function setLang(l) {
        lang = l;
        document.getElementById('btn-en').className = l==='en' ? 'active' : '';
        document.getElementById('btn-id').className = l==='id' ? 'active' : '';
        applyLang();
    }

    function applyLang() {
        document.getElementById('h-title').textContent = t('htitle');
        document.getElementById('h-sub').textContent = t('hsub');
        document.getElementById('tab0').textContent = t('tab0');
        document.getElementById('tab1').textContent = t('tab1');
        document.getElementById('tab2').textContent = t('tab2');
        document.getElementById('tab3').textContent = t('tab3');
        document.getElementById('t0-title').textContent = t('t0title');
        document.getElementById('t0-def').textContent = t('t0def');
        document.getElementById('t0-p1').textContent = t('t0p1');
        document.getElementById('q1-text').textContent = t('q1');
        document.getElementById('q2-text').textContent = t('q2');
        document.getElementById('q3-text').textContent = t('q3');
        document.getElementById('q4-text').textContent = t('q4');
        document.getElementById('q5-text').textContent = t('q5');
        updateScore();
    }

    function showTab(idx) {
        document.querySelectorAll('.section').forEach((s,i)=&gt;s.classList.toggle('active', i===idx));
        document.querySelectorAll('.tab-btn').forEach((b,i)=&gt;b.classList.toggle('active', i===idx));
    }

    function updateScore() {
        document.getElementById('score-label').textContent = t('score')+': '+score+' / '+total;
        const pct = total&gt;0?Math.round(score/total*100):0;
        document.getElementById('prog').style.width=pct+'%';
        document.getElementById('prog-label').textContent=pct+'%';
    }

    function mcq(qid, btn, res) {
        if(answered[qid]) return;
        answered[qid] = true;
        total++;
        const fb = document.getElementById(qid+'fb');
        fb.className = 'feedback show '+res;
        if(res==='correct') { score++; fb.textContent = t(qid+'cr'); btn.classList.add('correct'); }
        else { fb.textContent = t(qid+'wr'); btn.classList.add('wrong'); }
        updateScore();
    }

    applyLang();
